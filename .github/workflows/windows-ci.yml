name: Windows CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore
        run: dotnet restore Rc.RemoteController.sln -p:NuGetAudit=false
      - name: Build
        run: dotnet build Rc.RemoteController.sln --no-restore -warnaserror
      - name: Test
        run: dotnet test Rc.RemoteController.sln --no-build --no-restore -v minimal
      - name: Publish self-contained Windows x64 artifacts
        shell: powershell
        run: ./scripts/Publish-RemoteController.ps1 -OutputPath artifacts/publish
      - name: Verify installer payload
        shell: powershell
        run: |
          $required = 'Rc.Agent.exe', 'Rc.PrivilegedBroker.exe', 'Rc.TaskHost.exe', 'Rc.UiAgent.exe', 'Rc.Cli.exe', 'Install-RemoteController.ps1', 'Update-RemoteController.ps1', 'Uninstall-RemoteController.ps1', 'Start-RemoteController.cmd'
          foreach ($file in $required) { if (-not (Test-Path "artifacts/publish/$file" -PathType Leaf)) { throw "Missing $file" } }
      - uses: actions/upload-artifact@v4
        with:
          name: remote-controller-win-x64
          path: artifacts/publish/**
